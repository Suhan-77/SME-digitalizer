<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local SME Digitalizer</title>
    <style>
        /* Global Setup (Minimalist Background & Font) */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #1a1a1a;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
        }

        h1 {
            text-align: center;
            color: #0f172a;
            font-weight: 800;
            margin-bottom: 30px;
        }

        /* The Question Cards */
        .quiz-question {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
        }

        .quiz-question h2 {
            font-size: 1.3rem;
            color: #1e293b;
            margin-top: 0;
            margin-bottom: 20px;
        }

        /* The Answers (Large Tappable Buttons) */
        label {
            display: block;
            background: #f8fafc;
            padding: 16px 20px;
            margin-bottom: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            font-weight: 500;
        }

        /* Hover Effects */
        label:hover {
            border-color: #2563eb;
            background: #eff6ff;
        }

        input[type="radio"] {
            margin-right: 12px;
            transform: scale(1.3);
            accent-color: #2563eb;
        }

        /* The Submit Button */
        #submitBtn {
            display: block;
            width: 100%;
            background-color: #0f172a;
            color: #ffffff;
            border: none;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(15, 23, 42, 0.3);
            margin-top: 10px;
        }

        #submitBtn:hover {
            background-color: #1e293b;
            transform: translateY(-2px);
        }

        /* The Results Area */
        #resultText {
            margin-top: 30px;
            font-size: 1.15rem;
            background: #ffffff;
            padding: 25px;
            border-radius: 16px;
            border-left: 6px solid #10b981;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            display: none;
            /* Hidden until button is clicked */
        }

        #resultText h3 {
            color: #059669;
            margin-top: 0;
        }
    </style>
</head>

<body>

    <div class="quiz-question">
        <h2>1. How do you currently find new customers and promote your business?</h2>

        <label>
            <input type="radio" name="marketing" value="0">
            Word of mouth, physical flyers, or walk-ins only.
        </label><br><br>

        <label>
            <input type="radio" name="marketing" value="1">
            Manually posting on social media (Instagram, Snapchat, TikTok) or WhatsApp.
        </label><br><br>

        <label>
            <input type="radio" name="marketing" value="2">
            Running paid ads, using automated marketing tools, or loyalty programs.
        </label>
    </div>
    <div class="quiz-question">
        <h2>2. How do you currently track your inventory and daily sales?</h2>

        <label>
            <input type="radio" name="inventory" value="0">
            Pen and paper, manual counting, or a basic calculator.
        </label><br><br>

        <label>
            <input type="radio" name="inventory" value="1">
            Typing it into Excel spreadsheets or Google Sheets.
        </label><br><br>

        <label>
            <input type="radio" name="inventory" value="2">
            Cloud-based POS systems (like Foodics), automated tracking, or ERP software.
        </label>
    </div>
    <div class="quiz-question">
        <h2>3. How do your customers usually pay for your products or services?</h2>

        <label>
            <input type="radio" name="payments" value="0">
            Cash only. No card machines.
        </label><br><br>

        <label>
            <input type="radio" name="payments" value="1">
            Physical Mada/Credit card machines, or direct STC Pay transfers.
        </label><br><br>

        <label>
            <input type="radio" name="payments" value="2">
            Online payment links, Apple Pay, Buy-Now-Pay-Later (Tabby/Tamara), or integrated gateways.
        </label>
    </div>

    <br>
    <button id="submitBtn">Get My Digital Roadmap</button>
    <div id="resultText"></div>


    <script>
        document.getElementById("submitBtn").addEventListener("click", function () {

            // 1. Get the answers the user selected
            let q1 = document.querySelector('input[name="marketing"]:checked');
            let q2 = document.querySelector('input[name="inventory"]:checked');
            let q3 = document.querySelector('input[name="payments"]:checked');

            // Make sure they didn't skip any questions
            if (!q1 || !q2 || !q3) {
                alert("Please answer all 3 questions!");
                return;
            }

            // 2. Calculate the total score
            let totalScore = parseInt(q1.value) + parseInt(q2.value) + parseInt(q3.value);

            // 3. Determine the Roadmap based on the score
            let roadmap = "";

            if (totalScore <= 2) {
                roadmap = "<strong>Stage 1: Traditional.</strong> Your roadmap starts with the basics. <br>• Step 1: Get a physical Mada machine. <br>• Step 2: Set up a free Google Business Profile. <br>• Step 3: Transition from paper receipts to a free app like Square.";
            }
            else if (totalScore <= 4) {
                roadmap = "<strong>Stage 2: Basic Digital.</strong> You have a good foundation! <br>• Step 1: Upgrade to a cloud POS like Foodics. <br>• Step 2: Set up automated WhatsApp Business replies. <br>• Step 3: Start running $10/day local Instagram ads.";
            }
            else {
                roadmap = "<strong>Stage 3: Advanced.</strong> You are highly digital! <br>• Step 1: Integrate a loyalty program to retain customers. <br>• Step 2: Offer Buy-Now-Pay-Later (Tabby). <br>• Step 3: Automate your inventory reordering with ERP software.";
            }

            // 4. Print the score and roadmap to the screen
            document.getElementById("resultText").innerHTML = "<h3>Your Digital Maturity Score: " + totalScore + " / 6</h3><p>" + roadmap + "</p>";

            document.getElementById("resultText").style.display = "block";
        });
    </script>

</body>

</html>
