<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local SME Digitalizer</title>
  
  <style>
    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #f4f7f6;
      color: #1a1a1a;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
      transition: background-color 0.3s, color 0.3s;
    }

    h1 {
      text-align: center;
      color: #0f172a;
      font-weight: 800;
      margin-bottom: 20px;
    }

    .progress-wrapper {
      width: 100%;
      background-color: #e2e8f0;
      border-radius: 10px;
      margin-bottom: 30px;
      height: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background-color: #2563eb;
      width: 16.6%;
      transition: width 0.4s ease;
    }

    .step {
      display: none; 
      animation: fadeIn 0.5s;
    }

    .step.active {
      display: block; 
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .quiz-question {
      background: #ffffff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border: 1px solid #e2e8f0;
      transition: all 0.3s;
    }

    .quiz-question h2 {
      font-size: 1.3rem;
      color: #1e293b;
      margin-top: 0;
      margin-bottom: 20px;
    }

    label {
      display: block;
      background: #f8fafc;
      padding: 16px 20px;
      margin-bottom: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      font-weight: 500;
    }

    label:hover {
      border-color: #2563eb;
      background: #eff6ff;
    }

    input[type="radio"] {
      margin-right: 12px;
      transform: scale(1.3);
      accent-color: #2563eb;
    }

    .next-btn, #submitBtn {
      display: block;
      width: 100%;
      background-color: #0f172a;
      color: #ffffff;
      border: none;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      transition: background-color 0.3s;
      margin-top: 20px;
    }

    .next-btn:hover, #submitBtn:hover {
      background-color: #1e293b;
    }

    #resultText {
      margin-top: 30px;
      font-size: 1.15rem;
      background: #ffffff;
      padding: 25px;
      border-radius: 16px;
      border-left: 6px solid #10b981; 
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      display: none;
    }

    #resultText h3 {
      color: #059669;
      margin-top: 0;
    }

    /* --- DARK THEME OVERRIDES --- */
    body.dark-theme { background-color: #0f172a; color: #f8fafc; }
    body.dark-theme h1 { color: #f8fafc; }
    body.dark-theme .quiz-question, body.dark-theme #resultText { background: #1e293b; border-color: #334155; color: #f8fafc; }
    body.dark-theme .quiz-question h2, body.dark-theme #resultText h3 { color: #f8fafc; }
    body.dark-theme label { background: #334155; border-color: #475569; color: #e2e8f0; }
    body.dark-theme label:hover { border-color: #3b82f6; background: #1e3a8a; }
    body.dark-theme .progress-wrapper { background-color: #334155; }
    
    #themeToggle {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #e2e8f0;
      color: #0f172a;
      font-weight: bold;
      transition: all 0.3s;
    }
    body.dark-theme #themeToggle { background: #334155; color: #f8fafc; }
  </style>
</head>

<body>

  <button id="themeToggle">🌙 Dark Mode</button>
  <h1>SME Digital Maturity Quiz</h1>

  <div class="progress-wrapper">
    <div class="progress-fill" id="progressBar"></div>
  </div>

  <div class="step active" id="step1">
    <div class="quiz-question">
      <h2>1. What type of business do you run?</h2>
      <label><input type="radio" name="industry" value="Food & Beverage"> Food & Beverage (Cafe, Restaurant)</label>
      <label><input type="radio" name="industry" value="Retail"> Retail Store (Clothing, Electronics)</label>
      <label><input type="radio" name="industry" value="Services"> Services (Salon, Repair, Clinic)</label>
      <button class="next-btn" onclick="goToStep(2)">Next</button>
    </div>
  </div>

  <div class="step" id="step2">
    <div class="quiz-question">
      <h2>2. How do you find new customers?</h2>
      <label><input type="radio" name="marketing" value="0"> Word of mouth or physical flyers.</label>
      <label><input type="radio" name="marketing" value="1"> Manually posting on social media.</label>
      <label><input type="radio" name="marketing" value="2"> Running paid ads or automated tools.</label>
      <button class="next-btn" onclick="goToStep(3)">Next</button>
    </div>
  </div>

  <div class="step" id="step3">
    <div class="quiz-question">
      <h2>3. How do you track inventory and sales?</h2>
      <label><input type="radio" name="inventory" value="0"> Pen and paper or a calculator.</label>
      <label><input type="radio" name="inventory" value="1"> Excel spreadsheets or Google Sheets.</label>
      <label><input type="radio" name="inventory" value="2"> Cloud POS (like Foodics) or ERP.</label>
      <button class="next-btn" onclick="goToStep(4)">Next</button>
    </div>
  </div>

  <div class="step" id="step4">
    <div class="quiz-question">
      <h2>4. How do your customers usually pay?</h2>
      <label><input type="radio" name="payments" value="0"> Cash only. No card machines.</label>
      <label><input type="radio" name="payments" value="1"> Physical Mada machines or STC Pay.</label>
      <label><input type="radio" name="payments" value="2"> Apple Pay, Online Links, or Tabby/Tamara.</label>
      <button class="next-btn" onclick="goToStep(5)">Next</button>
    </div>
  </div>

  <div class="step" id="step5">
    <div class="quiz-question">
      <h2>5. What is your online presence?</h2>
      <label><input type="radio" name="online" value="0"> None. No website or Maps listing.</label>
      <label><input type="radio" name="online" value="1"> A Google Maps profile and Instagram.</label>
      <label><input type="radio" name="online" value="2"> Full e-commerce site or booking system.</label>
      <button class="next-btn" onclick="goToStep(6)">Next</button>
    </div>
  </div>

  <div class="step" id="step6">
    <div class="quiz-question">
      <h2>6. How do you keep customers coming back?</h2>
      <label><input type="radio" name="retention" value="0"> No specific system.</label>
      <label><input type="radio" name="retention" value="1"> Manual WhatsApp broadcasts.</label>
      <label><input type="radio" name="retention" value="2"> Automated loyalty points program.</label>
      <button id="submitBtn">Get My Digital Roadmap</button>
    </div>
  </div>

  <div id="resultText"></div>

  <script type="module">
    // 1. Import Firebase Cloud Tools
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    // 2. Your Exact Firebase Keys
    const firebaseConfig = {
      apiKey: "AIzaSyDQoZjy_FrmpcqLIzpfzvD-XU6WRGXwmK8",
      authDomain: "sme-digitalizer.firebaseapp.com",
      projectId: "sme-digitalizer",
      storageBucket: "sme-digitalizer.firebasestorage.app",
      messagingSenderId: "728359250892",
      appId: "1:728359250892:web:5c619c09228d0212120b69"
    };

    // 3. Connect to the Database
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- FRONTEND LOGIC ---
    
    // Theme Toggle
    document.getElementById("themeToggle").addEventListener("click", function() {
      document.body.classList.toggle("dark-theme");
      this.innerText = document.body.classList.contains("dark-theme") ? "☀️ Light Mode" : "🌙 Dark Mode";
    });

    // Navigation
    window.goToStep = function(stepNumber) {
      document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
      document.getElementById('step' + stepNumber).classList.add('active');
      document.getElementById('progressBar').style.width = (stepNumber * 16.6) + '%';
    }

    // Scoring & Saving to Cloud
    document.getElementById("submitBtn").addEventListener("click", async function() {
      let industry = document.querySelector('input[name="industry"]:checked');
      let q1 = document.querySelector('input[name="marketing"]:checked');
      let q2 = document.querySelector('input[name="inventory"]:checked');
      let q3 = document.querySelector('input[name="payments"]:checked');
      let q4 = document.querySelector('input[name="online"]:checked');
      let q5 = document.querySelector('input[name="retention"]:checked');

      if (!industry || !q1 || !q2 || !q3 || !q4 || !q5) {
        alert("Please make sure you answered every question!");
        return;
      }

      let totalScore = parseInt(q1.value) + parseInt(q2.value) + parseInt(q3.value) + parseInt(q4.value) + parseInt(q5.value);
      let roadmap = "";
      let stageName = "";
      
      if (totalScore <= 3) {
        stageName = "Stage 1: Traditional";
        roadmap = "<strong>" + stageName + "</strong><br><br>• Step 1: Claim your free Google Business Profile. <br>• Step 2: Get a physical Mada machine. <br>• Step 3: Use a free app like Square for receipts.";
      } else if (totalScore <= 7) {
        stageName = "Stage 2: Basic Digital";
        roadmap = "<strong>" + stageName + "</strong><br><br>• Step 1: Upgrade to a cloud POS like Foodics. <br>• Step 2: Set up automated WhatsApp Business replies. <br>• Step 3: Launch a Salla store for online orders.";
      } else {
        stageName = "Stage 3: Advanced";
        roadmap = "<strong>" + stageName + "</strong><br><br>• Step 1: Integrate a loyalty program (like Waffarha). <br>• Step 2: Offer Tabby/Tamara. <br>• Step 3: Automate inventory with ERP software.";
      }

      // Hide quiz and show loading state
      document.getElementById("step6").style.display = "none"; 
      document.querySelector(".progress-wrapper").style.display = "none"; 
      document.getElementById("resultText").innerHTML = "<h3>⏳ Saving results to database...</h3>";
      document.getElementById("resultText").style.display = "block";

      // 4. Send Data to Firebase
      try {
        const docRef = await addDoc(collection(db, "assessments"), {
          industry: industry.value,
          score: totalScore,
          stage: stageName,
          timestamp: serverTimestamp()
        });
        
        // Show actual results plus a success message
        document.getElementById("resultText").innerHTML = "<h3>Your Digital Maturity Score: " + totalScore + " / 10</h3><p>" + roadmap + "</p><p style='font-size: 0.85em; color: #10b981; margin-top: 20px;'>✅ Result saved securely to cloud database.</p>";
        
      } catch (e) {
        console.error("Error adding document: ", e);
        // If internet cuts out, still show the user their score
        document.getElementById("resultText").innerHTML = "<h3>Your Digital Maturity Score: " + totalScore + " / 10</h3><p>" + roadmap + "</p>";
      }
    });
  </script>
</body>
</html>
